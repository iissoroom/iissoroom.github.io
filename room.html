<!DOCTYPE html>
<html lang="ru">

<head>
<meta charset="UTF-8">
<title>Комната IISSO</title>

<style>

body{
margin:0;
height:100vh;

background-image:url("stone.png");
background-repeat:repeat;
background-size:300px;
}

.room{
position:relative;
width:100%;
height:100vh;

background-image:url("room.png");
background-size:auto 100%;
background-position:center bottom;
background-repeat:no-repeat;

/* эффект глубины */
box-shadow: inset 0 0 120px rgba(0,0,0,0.8);
}
.room::before{
content:"";
position:absolute;
left:0;
top:0;
width:80px;
height:100%;
background-image:url("stone.png");
background-size:cover;
box-shadow: inset -30px 0 40px rgba(0,0,0,0.8);
}

.room::after{
content:"";
position:absolute;
right:0;
top:0;
width:80px;
height:100%;
background-image:url("stone.png");
background-size:cover;
box-shadow: inset 30px 0 40px rgba(0,0,0,0.8);
}
/* зоны дверей */
.door{
position:absolute;
cursor:pointer;
}

/* мечи */
.swords{
left:18%;
top:38%;
width:9%;
height:22%;
}

/* пентакли */
.pentacles{
left:33%;
top:38%;
width:9%;
height:22%;
}

/* старшие */
.major{
left:48%;
top:36%;
width:10%;
height:24%;
}

/* жезлы */
.wands{
left:63%;
top:38%;
width:9%;
height:22%;
}

/* кубки */
.cups{
left:78%;
top:38%;
width:9%;
height:22%;
}

/* маленькая дверь */
.author{
left:73%;
top:60%;
width:5%;
height:12%;
}

</style>
</head>

<body>

<div class="room">

<a class="door swords" href="swords.html"></a>
<a class="door pentacles" href="pentacles.html"></a>
<a class="door major" href="major.html"></a>
<a class="door wands" href="wands.html"></a>
<a class="door cups" href="cups.html"></a>
<a class="door author" href="author.html"></a>

</div>

</body>
</html>
